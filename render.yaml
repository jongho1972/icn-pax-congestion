services:
  - type: web
    name: jhawk-pax-congestion
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    buildFilter:
      ignoredPaths:
        - Daily_Data/**
    envVars:
      - key: REFRESH_TOKEN
        sync: false
