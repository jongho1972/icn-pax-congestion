name: Daily backfill

on:
  # GH Actions schedule 큐 지연(+1~3h) 회피를 위해 cron-job.org에서 외부 트리거
  # cron-job.org가 17:25 KST + 23:30 KST에 workflow_dispatch API를 호출
  # (2026-05-14 D+1 데이터가 17:05엔 부분 적재돼 17:30 메일이 불완전 발송 → 17:25/17:50 패턴으로 이동)
  # (이전 schedule cron은 5/12 17:05 잡이 17:30 메일러 전까지 끝나지 못해 stale 데이터 발송됨)
  workflow_dispatch:

permissions:
  contents: write

env:
  # 2026-06-02 Node 20 → 24 강제 전환 대비, JS actions 즉시 Node 24로 동작
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pandas requests xlrd

      - name: Run airport.kr Excel backfill (D-0 + D+1)
        run: python3 backfill_excel.py

      - name: Commit and push if changed
        id: commit_push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Daily_Data/
          if git diff --cached --quiet; then
            echo "RESULT: NO_CHANGES"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            ls Daily_Data/ | wc -l
            exit 0
          fi
          git diff --cached --stat
          git commit -m "data: backfill $(TZ=Asia/Seoul date +%Y%m%d-%H%M)KST"
          # push 충돌 시 rebase 후 1회 재시도
          git push origin main || (git pull --rebase origin main && git push origin main)
          echo "RESULT: PUSHED"
          echo "pushed=true" >> "$GITHUB_OUTPUT"
          ls Daily_Data/ | wc -l

      - name: Trigger Render deploy (on actual push)
        # cron-job.org 외부 트리거 이전 후 schedule 분기 제거 — push가 실제로 일어난 경우에만 deploy
        if: steps.commit_push.outputs.pushed == 'true'
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_URL secret not set; skipping deploy trigger"
            exit 0
          fi
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK" -o /dev/null -w "HTTP %{http_code}\n"
          echo "Render deploy hook triggered"

      - name: Notify on failure
        if: failure()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 - <<'PY'
          import os, smtplib, ssl
          from email.message import EmailMessage
          user = os.environ.get("GMAIL_USER")
          pw = os.environ.get("GMAIL_APP_PASSWORD")
          if not user or not pw:
              print("[notify] secrets missing; skip"); raise SystemExit(0)
          msg = EmailMessage()
          msg["From"] = f"인천공항점(마케팅) <{user}>"
          msg["To"] = "jongho1972@gmail.com"
          msg["Subject"] = "[ICN 출국장] daily-backfill 실패"
          msg.set_content(
              "daily-backfill workflow가 실패했습니다. GitHub Actions 로그를 확인해주세요.\n"
              "https://github.com/jongho1972/icn-pax-congestion/actions"
          )
          with smtplib.SMTP_SSL("smtp.gmail.com", 465, context=ssl.create_default_context()) as s:
              s.login(user, pw)
              s.send_message(msg)
          print("[notify] sent")
          PY
