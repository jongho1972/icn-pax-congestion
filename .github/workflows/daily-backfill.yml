name: Daily backfill

on:
  schedule:
    # 매일 17:05 KST = 08:05 UTC — 17:00 KST OpenAPI 발표 직후 D+1 신선도 확보
    - cron: '5 8 * * *'
    # 매일 23:30 KST = 14:30 UTC — 그날 D-0 마감값 + 다음날 D+1 백업 (덮어쓰기)
    - cron: '30 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pandas requests beautifulsoup4

      - name: Run OpenAPI backfill (D-0 + D+1)
        env:
          INCHEON_API_KEY: ${{ secrets.INCHEON_API_KEY }}
        run: python3 backfill.py

      - name: Run airport.kr scraper (D-2 ~ D+2)
        run: python3 backfill_web.py

      - name: Commit and push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Daily_Data/
          if git diff --cached --quiet; then
            echo "RESULT: NO_CHANGES"
            ls Daily_Data/ | wc -l
            exit 0
          fi
          git diff --cached --stat
          git commit -m "data: backfill $(TZ=Asia/Seoul date +%Y%m%d-%H%M)KST"
          # push 충돌 시 rebase 후 1회 재시도
          git push origin main || (git pull --rebase origin main && git push origin main)
          echo "RESULT: PUSHED"
          ls Daily_Data/ | wc -l

      - name: Notify on failure
        if: failure()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 - <<'PY'
          import os, smtplib, ssl
          from email.message import EmailMessage
          user = os.environ.get("GMAIL_USER")
          pw = os.environ.get("GMAIL_APP_PASSWORD")
          if not user or not pw:
              print("[notify] secrets missing; skip"); raise SystemExit(0)
          msg = EmailMessage()
          msg["From"] = f"인천공항점(마케팅) <{user}>"
          msg["To"] = "jongho1972@gmail.com"
          msg["Subject"] = "[ICN 출국장] daily-backfill 실패"
          msg.set_content(
              "daily-backfill workflow가 실패했습니다. GitHub Actions 로그를 확인해주세요.\n"
              "https://github.com/jongho1972/icn-pax-congestion/actions"
          )
          with smtplib.SMTP_SSL("smtp.gmail.com", 465, context=ssl.create_default_context()) as s:
              s.login(user, pw)
              s.send_message(msg)
          print("[notify] sent")
          PY
