name: Daily backfill

on:
  schedule:
    # 매일 23:30 KST = 14:30 UTC
    - cron: '30 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Run backfill
        env:
          INCHEON_API_KEY: ${{ secrets.INCHEON_API_KEY }}
        run: python3 backfill.py

      - name: Commit and push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Daily_Data/
          if git diff --cached --quiet; then
            echo "RESULT: NO_CHANGES"
            ls Daily_Data/ | wc -l
            exit 0
          fi
          git diff --cached --stat
          git commit -m "data: daily backfill $(date -u +%Y%m%d)"
          git push origin main
          echo "RESULT: PUSHED"
          ls Daily_Data/ | wc -l
