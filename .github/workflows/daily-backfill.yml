name: Daily backfill

on:
  schedule:
    # 매일 17:05 KST = 08:05 UTC — 17:00 KST OpenAPI 발표 직후 D+1 신선도 확보
    - cron: '5 8 * * *'
    # 매일 23:30 KST = 14:30 UTC — 그날 D-0 마감값 + 다음날 D+1 백업 (덮어쓰기)
    - cron: '30 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pandas requests beautifulsoup4

      - name: Run OpenAPI backfill (D-0 + D+1)
        env:
          INCHEON_API_KEY: ${{ secrets.INCHEON_API_KEY }}
        run: python3 backfill.py

      - name: Run airport.kr scraper (D-2 ~ D+2)
        run: python3 backfill_web.py

      - name: Commit and push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Daily_Data/
          if git diff --cached --quiet; then
            echo "RESULT: NO_CHANGES"
            ls Daily_Data/ | wc -l
            exit 0
          fi
          git diff --cached --stat
          git commit -m "data: backfill $(TZ=Asia/Seoul date +%Y%m%d-%H%M)KST"
          git push origin main
          echo "RESULT: PUSHED"
          ls Daily_Data/ | wc -l
