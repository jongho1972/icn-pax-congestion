name: Daily mailer

on:
  # GH Actions schedule 큐 지연(+1~3h) 회피를 위해 cron-job.org에서 외부 트리거
  # cron-job.org가 17:30 KST에 workflow_dispatch API를 호출해 즉시 발사
  workflow_dispatch:
    inputs:
      test_recipient:
        description: '테스트 수신자 1명 (입력 시 메일링 리스트 대신 이 주소로만 발송)'
        required: false
        default: ''

env:
  # 2026-06-02 Node 20 → 24 강제 전환 대비, JS actions 즉시 Node 24로 동작
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  mail:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install python-dotenv playwright pandas requests xlrd holidays
          playwright install --with-deps chromium

      - name: Override mailing list (test only)
        if: inputs.test_recipient != ''
        run: echo "${{ inputs.test_recipient }}" > mailing_list.txt

      - name: Capture dashboard
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: python capture_dashboard.py dashboard.png

      - name: Send daily email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_RECIPIENTS: ${{ inputs.test_recipient != '' && inputs.test_recipient || secrets.MAIL_RECIPIENTS }}
        run: python send_daily_email.py dashboard.png

      - name: Upload artifact (debug)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dashboard-snapshot
          path: dashboard.png
          retention-days: 7

      - name: Notify on failure
        if: failure()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: jongho1972@gmail.com
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import os, smtplib
          from email.mime.text import MIMEText
          from email.utils import formataddr
          body = (
              "인천공항 국제선 예상 승객수 일일 메일 발송이 실패했습니다.\n\n"
              f"워크플로우 로그: {os.environ['RUN_URL']}\n"
          )
          msg = MIMEText(body, "plain", "utf-8")
          msg["Subject"] = "[실패] 인천공항 국제선 예상 승객수 일일 메일러"
          msg["From"] = formataddr(("인천공항점(마케팅)", os.environ["GMAIL_USER"]))
          msg["To"] = os.environ["NOTIFY_TO"]
          pw = "".join(os.environ["GMAIL_APP_PASSWORD"].split())
          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
              s.login(os.environ["GMAIL_USER"], pw)
              s.send_message(msg)
          print("Failure notification sent to", os.environ["NOTIFY_TO"])
          PY
