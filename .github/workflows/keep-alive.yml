name: Keep Render alive

on:
  schedule:
    - cron: '*/10 * * * *'  # 10분마다 (Render 무료 플랜 슬립 방지)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /healthz
        run: |
          curl -fsS --max-time 60 --retry 2 \
            https://jhawk-pax-congestion.onrender.com/healthz
