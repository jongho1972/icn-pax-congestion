name: Keep Render alive

on:
  schedule:
    - cron: '*/10 * * * *'  # 10분마다 (Render 무료 플랜 슬립 방지)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Warm payload cache via /
        run: |
          curl -fsS -o /dev/null --max-time 300 --retry 2 --retry-delay 30 \
            https://jhawk-pax-congestion.onrender.com/
