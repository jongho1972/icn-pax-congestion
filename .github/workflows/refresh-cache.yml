name: Refresh dashboard cache

on:
  schedule:
    # 매일 17:30 KST = 08:30 UTC — 17:25 backfill 직후 캐시 갱신
    - cron: '30 8 * * *'
    # 매일 23:35 KST = 14:35 UTC — 23:30 backfill 직후 캐시 갱신
    - cron: '35 14 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/refresh
        run: |
          curl -fsS --max-time 180 --retry 2 \
            -X POST \
            -H "X-Refresh-Token: ${{ secrets.REFRESH_TOKEN }}" \
            https://pax.j-hawk.kr/api/refresh
